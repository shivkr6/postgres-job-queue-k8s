services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-job-queue
    environment:
      POSTGRES_USER: queue
      POSTGRES_PASSWORD: queue
      POSTGRES_DB: queue
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue -d queue"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
