apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  labels:
    {{- include "postgres-job-queue.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "postgres-job-queue.postgresSelectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
